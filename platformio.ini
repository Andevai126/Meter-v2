; https://docs.platformio.org/page/projectconf.html

[env:esp-wrover-kit]
platform = https://github.com/platformio/platform-espressif32.git
board = esp-wrover-kit
framework = arduino
lib_deps = 
	greiman/SdFat@2.2.2
	https://github.com/pschatzmann/arduino-audio-tools.git#52d0db2
    https://github.com/pschatzmann/arduino-libhelix.git#27d09c3
	https://github.com/pschatzmann/arduino-simple-tts.git#8617a49
	fastled/FastLED@3.6.0
	marcmerlin/Framebuffer GFX@^1.1
build_flags = -DCORE_DEBUG_LEVEL=3 ; 2
; upload_port = COM3

